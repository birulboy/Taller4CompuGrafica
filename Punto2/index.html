<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Acerca de Ti</title>
</head>
<body>

    <section class="Punto_4">

        <h1>Acerca de Ti</h1>
        <p class="subtitulo">Completa el formulario con tu información personal y profesional</p>

        <form>

            <div class="input-group">
                <label>Nombre completo</label>
                <input type="text" placeholder="Ej: María García">
            </div>

            <div class="input-group">
                <label>Fecha de nacimiento</label>
                <input type="date">
            </div>

            <div class="input-group">
                <label>Edad</label>
                <input type="number" placeholder="Ej: 24" min="0" max="120">
            </div>

            <div class="input-group">
                <label>Correo electrónico</label>
                <input type="email" placeholder="correo@ejemplo.com">
            </div>

            <div class="input-group">
                <label>Teléfono</label>
                <input type="tel" placeholder="+57 300 000 0000">
            </div>

            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" placeholder="Mínimo 8 caracteres">
            </div>

            <div class="input-group">
                <label>País de residencia</label>
                <input type="text" placeholder="Ej: Colombia">
            </div>

            <div class="input-group">
                <label>Ciudad</label>
                <input type="text" placeholder="Ej: Pereira">
            </div>

            <div class="input-group">
                <label>Dirección</label>
                <input type="text" placeholder="Calle, número, barrio...">
            </div>

            <div class="input-group">
                <label>Profesión</label>
                <input type="text" placeholder="Ej: Desarrollador Web">
            </div>

            <div class="input-group">
                <label>Nivel de educación</label>
                <input type="text" placeholder="Ej: Universitario">
            </div>

            <div class="input-group">
                <label>Años de experiencia</label>
                <input type="number" placeholder="Ej: 3" min="0">
            </div>

            <div class="input-group">
                <label>Salario esperado (COP)</label>
                <input type="number" placeholder="Ej: 3000000" min="0">
            </div>

            <div class="input-group">
                <label>Sitio web o portafolio</label>
                <input type="url" placeholder="https://mipagina.com">
            </div>

            <div class="input-group">
                <label>Idiomas que hablas</label>
                <input type="text" placeholder="Ej: Español, Inglés">
            </div>

            <div class="input-group">
                <label>Habilidades principales</label>
                <input type="text" placeholder="Ej: HTML, CSS, JavaScript">
            </div>

            <div class="input-group">
                <label>Disponibilidad para viajar</label>
                <input type="text" placeholder="Ej: Ocasionalmente">
            </div>

            <div class="input-group">
                <label>Disponibilidad para empezar</label>
                <input type="text" placeholder="Ej: Inmediata">
            </div>

            <div class="input-group">
                <label>¿Tienes experiencia trabajando en equipo?</label>
                <div class="radio-group">
                    <label><input type="radio" name="equipo" value="si"> Sí</label>
                    <label><input type="radio" name="equipo" value="no"> No</label>
                </div>
            </div>

            <div class="input-group">
                <label>¿En qué modalidad prefieres trabajar?</label>
                <div class="checkbox-group">
                    <label><input type="checkbox"> Presencial</label>
                    <label><input type="checkbox"> Remoto</label>
                    <label><input type="checkbox"> Híbrido</label>
                </div>
            </div>

            <div class="input-group">
                <label>Color favorito</label>
                <input type="color" value="#3a86ff">
            </div>

            <div class="input-group">
                <label>Nivel de inglés (0 - 100)</label>
                <input type="range" min="0" max="100" value="50">
            </div>

            <div class="input-group full">
                <label>Metas profesionales</label>
                <textarea placeholder="Describe brevemente tus objetivos a futuro..." rows="4"></textarea>
            </div>

            <div class="form-footer">
                <input type="reset" value="Limpiar">
                <input type="submit" value="Enviar">
            </div>

        </form>

    </section>

</body>
</html>
