<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.2/css/all.css"
          integrity="sha384-fnmOCqbTlWIlj8LyTjo7mOUStjsKC4pOpQbqyi7RrhN7udi9RwhKkMHpvLbHG9Sr"
          crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <title>Spotify – Iniciar sesión</title>
</head>
<body>

    <div class="card">
        <img 
            class="logo"
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Spotify_logo_without_text.svg/200px-Spotify_logo_without_text.svg.png"
            alt="Spotify logo"
        >
        <h1>Inicia sesión en Spotify</h1>

        <!-- Botones de acceso con terceros.
             Se usan etiquetas <button> en lugar de <a> porque representan una acción,
             no una navegación. Cada uno tiene un ícono de Font Awesome a la izquierda. -->
        <div class="social-buttons">
            <button class="btn-social">
                <i class="fab fa-google"></i> Continuar con Google
            </button>
            <button class="btn-social">
                <i class="fab fa-facebook-f"></i> Continuar con Facebook
            </button>
            <button class="btn-social">
                <i class="fab fa-apple"></i> Continuar con Apple
            </button>
        </div>

        <!-- <hr> dibuja una línea horizontal. Aquí se usa como separador visual
             entre los botones de redes sociales y el formulario de correo.
             Por defecto es feo, pero con CSS se puede estilizar completamente. -->
        <div class="divider">
            <hr>
            <span>o</span>
            <hr>
        </div>

        <form>

            <div class="input-group">
                <label>Correo electrónico o nombre de usuario</label>
                <input type="email" placeholder="Correo o nombre de usuario">
            </div>

            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" placeholder="Contraseña">
            </div>

            <!-- <a> es un enlace de navegación. Se diferencia de <button> en que
                 lleva al usuario a otra página, no ejecuta una acción en la actual.
                 Aquí se usa para "¿Olvidaste la contraseña?" -->
            <a href="#" class="forgot">¿Olvidaste la contraseña?</a>

            <div class="input-group remember">
                <label>
                    <input type="checkbox"> Recuérdame
                </label>
            </div>

            <input type="submit" class="btn-login" value="Iniciar sesión">

        </form>

        <p class="register-text">
            ¿No tienes cuenta? <a href="#">Regístrate en Spotify</a>
        </p>

    </div>

</body>
</html>
